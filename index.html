<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعليم لغات البرمجة</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI";
    background: #0f172a;
    color: white;
}

.hero {
    position: relative;
    width: 1400px; 
    height: 600px; 
    margin: 40px auto; 
    background: url("h1.png") ;
    background-size: cover; 
    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 20px; 
    overflow: hidden; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
}




.hero-content {
    position: relative;
    max-width: 600px;
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 8px;
}

.card a:hover {
    background: #2563eb;
}

footer {
    text-align: center;
    padding: 20px;
    background: #111;
    color: #aaa;
    margin-top: 30px;
} 

</style>

</head>
<body>

<div class="hero">
    <div class="hero-content">
    </div>
</div>

<div class="container">

<div class="card">
<img src="HTML.png">
<div class="card-content">
<h3>لغة HTML </h3>
<a href="page1.html">الدخول</a>
</div>
</div>

<div class="card">
<img src="css.png">
<div class="card-content">
<h3> لغة CSS</h3>
<a href="page2.html">الدخول</a>
</div>
</div>

<div class="card">
<img src="Python.png">
<div class="card-content">
<h3>لغة Python </h3>
<a href="page3.html">الدخول</a>
</div>
</div>

<div class="card">
<img src="Javascript.png">
<div class="card-content">
<h3>لغة Java script</h3>
<a href="page4.html">الدخول</a>
</div>
</div>

</div>
<footer>
    مشروع جامعي - للطالب حسام الشرماني 
</footer>

</body>
</html>
